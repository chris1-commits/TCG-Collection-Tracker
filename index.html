<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Card Condition Worksheet</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #333;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #4f98a3;
    --accent-hover: #3d7a84;
    --green: #4caf50;
    --amber: #ffa726;
    --red: #ef5350;
    --gem-bg: #1a3a1a;
    --nm-bg: #3a2a00;
    --lp-bg: #3a0f0f;
    --row-hover: #252525;
  }
  [data-theme="light"] {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --border: #ddd;
    --text: #1a1a1a;
    --muted: #666;
    --row-hover: #f9f9f9;
    --gem-bg: #e8f5e9;
    --nm-bg: #fff8e1;
    --lp-bg: #ffebee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 15px; font-weight: 700; color: var(--accent); flex: none; }
  .header-meta { font-size: 11px; color: var(--muted); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* SAVE STATUS */
  .save-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: #1a3a1a; color: #4caf50; border: 1px solid #2d5a2d; transition: all 0.3s; }
  .save-badge.saving { background: #3a2a00; color: #ffa726; border-color: #5a4000; }
  .save-badge.unsaved { background: #3a0f0f; color: #ef5350; border-color: #5a1a1a; }

  /* SUMMARY BAR */
  .summary-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 20px; flex-wrap: wrap; font-size: 12px; }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-weight: 700; color: var(--accent); }

  /* CONTROLS */
  .controls { background: var(--surface2); padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 49px; z-index: 99; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 28px 5px 8px; border-radius: 4px; font-size: 12px; }
  .search-clear { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--muted); font-size: 14px; border: none; background: none; color: var(--muted); }
  .btn { padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; background: var(--surface); color: var(--text); }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  select.filter-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 12px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 8px 6px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; cursor: pointer; user-select: none; position: sticky; top: 0; }
  thead th:hover { color: var(--accent); }
  thead th .sort-arrow { display: inline-block; margin-left: 3px; opacity: 0.4; }
  thead th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--row-hover); }
  tbody td { padding: 5px 6px; vertical-align: middle; }
  .col-num { color: var(--muted); font-size: 11px; width: 36px; text-align: right; padding-right: 10px; }
  .col-name { font-weight: 600; max-width: 200px; }
  .col-set { color: var(--muted); font-size: 11px; max-width: 160px; }
  .col-rarity { font-size: 11px; color: var(--muted); }
  .col-price { font-weight: 700; color: var(--accent); text-align: right; width: 80px; }
  .col-qty { text-align: center; width: 40px; color: var(--muted); }

  /* CONDITION DROPDOWNS */
  .cond-select { width: 70px; padding: 3px 4px; border-radius: 3px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; background: var(--surface); color: var(--text); cursor: pointer; }
  .cond-gem { background: var(--gem-bg) !important; color: #4caf50 !important; border-color: #2d5a2d !important; }
  .cond-nm { background: var(--nm-bg) !important; color: #ffa726 !important; border-color: #5a4000 !important; }
  .cond-lp { background: var(--lp-bg) !important; color: #ef5350 !important; border-color: #5a1a1a !important; }

  /* SUBMIT & SELFGRADE */
  .submit-select { width: 80px; padding: 3px 4px; border-radius: 3px; border: 1px solid var(--border); font-size: 11px; font-weight: 700; background: var(--surface); color: var(--text); cursor: pointer; }
  .submit-yes { background: #1a3a1a !important; color: #4caf50 !important; border-color: #2d5a2d !important; }
  .submit-maybe { background: #3a2a00 !important; color: #ffa726 !important; border-color: #5a4000 !important; }
  .submit-no { background: #3a0f0f !important; color: #ef5350 !important; border-color: #5a1a1a !important; }
  .self-select { width: 68px; padding: 3px 4px; border-radius: 3px; border: 1px solid var(--border); font-size: 11px; background: var(--surface); color: var(--text); cursor: pointer; }

  /* NOTES */
  .notes-input { width: 120px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 3px 5px; border-radius: 3px; font-size: 11px; }
  .notes-input:focus { outline: none; border-color: var(--accent); }

  /* RARITY BADGE */
  .rarity-badge { display: inline-block; padding: 1px 5px; border-radius: 10px; font-size: 10px; background: var(--surface2); border: 1px solid var(--border); white-space: nowrap; }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; gap: 6px; padding: 10px 16px; background: var(--surface); border-top: 1px solid var(--border); }
  .page-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-btn.current { background: var(--accent); color: #fff; border-color: var(--accent); }
  .page-info { font-size: 12px; color: var(--muted); margin: 0 4px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state p { margin-top: 8px; font-size: 12px; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--accent); color: var(--text); padding: 10px 16px; border-radius: 6px; font-size: 13px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; pointer-events: none; }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* THEME TOGGLE */
  .theme-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }

  @media (max-width: 768px) {
    .col-set { display: none; }
    .col-rarity { display: none; }
    .notes-input { width: 80px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🃏 Pokémon Card Condition Worksheet</h1>
  <span class="header-meta" id="totalCount"></span>
  <div class="header-right">
    <span class="save-badge" id="saveBadge">✓ Saved</span>
    <button class="btn btn-danger" onclick="clearAllData()">Clear All</button>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">☀️</button>
  </div>
</div>

<div class="summary-bar" id="summaryBar">
  <div class="stat-item"><span class="stat-label">Total Cards</span><span class="stat-value" id="s-total">—</span></div>
  <div class="stat-item"><span class="stat-label">Submit YES</span><span class="stat-value" id="s-yes">—</span></div>
  <div class="stat-item"><span class="stat-label">Submit MAYBE</span><span class="stat-value" id="s-maybe">—</span></div>
  <div class="stat-item"><span class="stat-label">All GEM rows</span><span class="stat-value" id="s-allgem">—</span></div>
  <div class="stat-item"><span class="stat-label">Total Value (AUD)</span><span class="stat-value" id="s-value">—</span></div>
  <div class="stat-item"><span class="stat-label">Yes Value (AUD)</span><span class="stat-value" id="s-yesval">—</span></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search card name, set…" oninput="applyFilters()">
    <button class="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <select class="filter-select" id="filterSubmit" onchange="applyFilters()">
    <option value="">All Submit</option>
    <option value="YES">YES</option>
    <option value="MAYBE">MAYBE</option>
    <option value="NO">NO</option>
    <option value="unset">Unset</option>
  </select>
  <select class="filter-select" id="filterCond" onchange="applyFilters()">
    <option value="">All Condition</option>
    <option value="GEM">Any GEM</option>
    <option value="allgem">All 4 GEM</option>
    <option value="haslp">Has LP</option>
  </select>
  <select class="filter-select" id="filterSet" onchange="applyFilters()">
    <option value="">All Sets</option>
  </select>
  <select class="filter-select" id="pageSize" onchange="changePageSize()">
    <option value="50">50 / page</option>
    <option value="100">100 / page</option>
    <option value="200">200 / page</option>
    <option value="500">500 / page</option>
    <option value="9999">All</option>
  </select>
  <button class="btn" onclick="resetFilters()">Reset</button>
</div>

<div class="table-wrap">
<table id="mainTable">
  <thead>
    <tr>
      <th class="col-num">#</th>
      <th onclick="sortBy('name')">Card Name <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('set')">Set <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('rarity')">Rarity <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('price')" style="text-align:right">Price (AUD) <span class="sort-arrow">↕</span></th>
      <th style="text-align:center">Qty</th>
      <th style="text-align:center">Centering</th>
      <th style="text-align:center">Corners</th>
      <th style="text-align:center">Edges</th>
      <th style="text-align:center">Surface</th>
      <th style="text-align:center">Self Grade</th>
      <th style="text-align:center">Submit?</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>

<div class="pagination" id="pagination"></div>
<div id="toast"></div>

  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saves));
      setBadge('saved');
    } catch(e) {
      setBadge('unsaved');
      showToast('⚠️ Storage full — export CSV to preserve data');
    }
  }, 600);
}

function setBadge(state) {
  const badge = document.getElementById('saveBadge');
  badge.className = 'save-badge' + (state === 'saving' ? ' saving' : state === 'unsaved' ? ' unsaved' : '');
  badge.textContent = state === 'saving' ? '⏳ Saving…' : state === 'unsaved' ? '⚠️ Not saved' : '✓ Saved';
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init() {
  loadSaves();
  populateSetFilter();
  applyFilters();
  updateSummary();
  document.getElementById('totalCount').textContent = `${CARDS.length.toLocaleString()} Pokémon cards`;
}

function populateSetFilter() {
  const sets = [...new Set(CARDS.map(c => c.set))].sort();
  const sel = document.getElementById('filterSet');
  sets.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

// ══════════════════════════════════════════════════════
// FILTERING & SORTING
// ══════════════════════════════════════════════════════
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const fSubmit = document.getElementById('filterSubmit').value;
  const fCond = document.getElementById('filterCond').value;
  const fSet = document.getElementById('filterSet').value;

  filtered = CARDS.filter((c, i) => {
    const k = cardKey(c);
    const sv = saves[k] || {};

    if (q && !c.name.toLowerCase().includes(q) && !c.set.toLowerCase().includes(q) && !c.number.toLowerCase().includes(q)) return false;
    if (fSet && c.set !== fSet) return false;

    if (fSubmit) {
      const sub = sv.submit || '';
      if (fSubmit === 'unset') { if (sub) return false; }
      else if (sub !== fSubmit) return false;
    }

    if (fCond) {
      const conds = [sv.centering, sv.corners, sv.edges, sv.surface];
      if (fCond === 'GEM') { if (!conds.some(x => x === 'GEM')) return false; }
      else if (fCond === 'allgem') { if (!conds.every(x => x === 'GEM')) return false; }
      else if (fCond === 'haslp') { if (!conds.some(x => x === 'LP')) return false; }
    }

    return true;
  });

  sortFiltered();
  currentPage = 1;
  renderTable();
  renderPagination();
  updateSummary();
}

function sortBy(col) {
  if (sortCol === col) { sortDir *= -1; }
  else { sortCol = col; sortDir = (col === 'price') ? -1 : 1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  sortFiltered();
  renderTable();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const start = (currentPage - 1) * pageSize;
  const end = pageSize === 9999 ? filtered.length : Math.min(start + pageSize, filtered.length);
  const slice = filtered.slice(start, end);

  if (slice.length === 0) {
    tbody.innerHTML = '<tr><td colspan="13"><div class="empty-state"><div>🔍 No cards match your filters</div><p>Try adjusting search or filters above</p></div></td></tr>';
    return;
  }

  const rows = slice.map((card, idx) => {
    const k = cardKey(card);
    const sv = saves[k] || {};
    const globalIdx = start + idx + 1;
    const priceStr = card.price > 0 ? `${card.price.toLocaleString('en-AU', {minimumFractionDigits:2, maximumFractionDigits:2})}` : '—';

    const condCols = ['centering','corners','edges','surface'].map(field => {
      const val = sv[field] || '';
      const cls = val === 'GEM' ? 'cond-gem' : val === 'NM' ? 'cond-nm' : val === 'LP' ? 'cond-lp' : '';
      const opts = COND_OPTS.map(o => `<option value="${o}"${val===o?' selected':''}>${o===''?'—':o}</option>`).join('');
      return `<td style="text-align:center"><select class="cond-select ${cls}" onchange="updateField('${k}','${field}',this.value,this)">${opts}</select></td>`;
    }).join('');

    const selfVal = sv.selfGrade || '';
    const selfOpts = SELF_OPTS.map(o => `<option value="${o}"${selfVal===o?' selected':''}>${o===''?'—':o}</option>`).join('');

    const subVal = sv.submit || '';
    const subCls = subVal === 'YES' ? 'submit-yes' : subVal === 'MAYBE' ? 'submit-maybe' : subVal === 'NO' ? 'submit-no' : '';
    const subOpts = SUBMIT_OPTS.map(o => `<option value="${o}"${subVal===o?' selected':''}>${o===''?'—':o}</option>`).join('');

    const notesVal = (sv.notes || '').replace(/"/g, '&quot;');

    return `<tr>
      <td class="col-num">${globalIdx}</td>
      <td class="col-name">${escHtml(card.name)}</td>
      <td class="col-set" title="${escHtml(card.set)}">${escHtml(card.set)}</td>
      <td class="col-rarity"><span class="rarity-badge">${escHtml(card.rarity)}</span></td>
      <td class="col-price">${priceStr}</td>
      <td class="col-qty">${card.qty}</td>
      ${condCols}
      <td style="text-align:center"><select class="self-select" onchange="updateField('${k}','selfGrade',this.value,null)">${selfOpts}</select></td>
      <td style="text-align:center"><select class="submit-select ${subCls}" onchange="updateField('${k}','submit',this.value,this)">${subOpts}</select></td>
      <td><input class="notes-input" type="text" value="${notesVal}" placeholder="Notes…" onchange="updateField('${k}','notes',this.value,null)" oninput="debounceNotes('${k}',this.value)"></td>
    </tr>`;
  }).join('');

  tbody.innerHTML = rows;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════
// FIELD UPDATE
// ══════════════════════════════════════════════════════
function updateField(key, field, value, selectEl) {
  if (!saves[key]) saves[key] = {};
  saves[key][field] = value;

  // Auto-color the select element
  if (selectEl && ['centering','corners','edges','surface'].includes(field)) {
    selectEl.className = 'cond-select ' + (value==='GEM' ? 'cond-gem' : value==='NM' ? 'cond-nm' : value==='LP' ? 'cond-lp' : '');
  }
  if (selectEl && field === 'submit') {
    selectEl.className = 'submit-select ' + (value==='YES' ? 'submit-yes' : value==='MAYBE' ? 'submit-maybe' : value==='NO' ? 'submit-no' : '');
  }

  // Auto-promote: if all 4 conditions are GEM, set submit to YES (if unset)
  if (['centering','corners','edges','surface'].includes(field)) {
    const sv = saves[key];
    if (sv.centering==='GEM' && sv.corners==='GEM' && sv.edges==='GEM' && sv.surface==='GEM') {
      if (!sv.submit) {
        sv.submit = 'YES';
        // re-render to reflect change in submit dropdown
        renderTable();
      }
    }
  }

  persistSaves();
  updateSummary();
}

let notesTimer = {};
function debounceNotes(key, value) {
  clearTimeout(notesTimer[key]);
  notesTimer[key] = setTimeout(() => updateField(key, 'notes', value, null), 800);
}

// ══════════════════════════════════════════════════════
// SUMMARY
// ══════════════════════════════════════════════════════
function updateSummary() {
  let total = filtered.length;
  let yes = 0, maybe = 0, allgem = 0, totalVal = 0, yesVal = 0;

  filtered.forEach(card => {
    const k = cardKey(card);
    const sv = saves[k] || {};
    const sub = sv.submit || '';
    const conds = [sv.centering, sv.corners, sv.edges, sv.surface];

    if (sub === 'YES') { yes++; yesVal += card.price; }
    if (sub === 'MAYBE') maybe++;
    if (conds.every(x => x === 'GEM')) allgem++;
    totalVal += card.price;
  });

  document.getElementById('s-total').textContent = total.toLocaleString();
  document.getElementById('s-yes').textContent = yes.toLocaleString();
  document.getElementById('s-maybe').textContent = maybe.toLocaleString();
  document.getElementById('s-allgem').textContent = allgem.toLocaleString();
  document.getElementById('s-value').textContent = '$' + totalVal.toLocaleString('en-AU', {minimumFractionDigits:0, maximumFractionDigits:0});
  document.getElementById('s-yesval').textContent = '$' + yesVal.toLocaleString('en-AU', {minimumFractionDigits:0, maximumFractionDigits:0});
}

// ══════════════════════════════════════════════════════
// PAGINATION
// ══════════════════════════════════════════════════════
function renderPagination() {
  const pagination = document.getElementById('pagination');
  if (pageSize === 9999) { pagination.innerHTML = ''; return; }
  const totalPages = Math.ceil(filtered.length / pageSize);
  if (totalPages <= 1) { pagination.innerHTML = `<span class="page-info">${filtered.length} cards</span>`; return; }

  let html = `<span class="page-info">${filtered.length} cards</span>`;
  html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  let pages = [];
  if (totalPages <= 7) {
    for (let i=1;i<=totalPages;i++) pages.push(i);
  } else {
    pages = [1];
    if (currentPage > 3) pages.push('…');
    for (let i=Math.max(2,currentPage-1);i<=Math.min(totalPages-1,currentPage+1);i++) pages.push(i);
    if (currentPage < totalPages-2) pages.push('…');
    pages.push(totalPages);
  }

  pages.forEach(p => {
    if (p === '…') html += `<span class="page-info">…</span>`;
    else html += `<button class="page-btn ${p===currentPage?'current':''}" onclick="goPage(${p})">${p}</button>`;
  });

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pagination.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / pageSize);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
  renderPagination();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function changePageSize() {
  pageSize = parseInt(document.getElementById('pageSize').value);
  currentPage = 1;
  renderTable();
  renderPagination();
}

// ══════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════
function clearSearch() {
  document.getElementById('searchInput').value = '';
  applyFilters();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterSubmit').value = '';
  document.getElementById('filterCond').value = '';
  document.getElementById('filterSet').value = '';
  applyFilters();
}

function clearAllData() {
  if (!confirm('Clear ALL saved condition data? This cannot be undone.')) return;
  saves = {};
  localStorage.removeItem(STORAGE_KEY);
  renderTable();
  updateSummary();
  setBadge('saved');
  showToast('All data cleared');
}

function exportCSV() {
  const rows = [['Set','Card Name','Card Number','Rarity','Price AUD','Qty','Centering','Corners','Edges','Surface','Self Grade','Submit','Notes']];
  CARDS.forEach(card => {
    const k = cardKey(card);
    const sv = saves[k] || {};
    rows.push([
      card.set, card.name, card.number, card.rarity, card.price, card.qty,
      sv.centering||'', sv.corners||'', sv.edges||'', sv.surface||'',
      sv.selfGrade||'', sv.submit||'', sv.notes||''
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pokemon_worksheet_export.csv';
  a.click();
  showToast('CSV exported!');
}

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
init();
</script>
